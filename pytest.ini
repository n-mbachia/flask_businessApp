[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    performance: Performance and load tests
    security: Security and vulnerability tests
    analytics: Analytics service tests
    predictive: Predictive analytics tests
    realtime: Real-time dashboard tests
    api: API endpoint tests
    slow: Tests that take longer to run
    database: Tests requiring database setup
    external: Tests requiring external services
    skip_auto_context: Tests that manage their own Flask context

# Coverage configuration
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */venv/*
    */__pycache__/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
title = Business Intelligence Test Coverage

# Test discovery
[pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:werkzeug.*
    ignore::UserWarning:flask.*

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test execution
timeout = 300
timeout_method = thread
