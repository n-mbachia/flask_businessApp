<div class="bg-white border border-gray-200 rounded-lg p-4 mb-3 order-item" data-index="{{ index }}">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
        <!-- Product Select -->
        <div class="md:col-span-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Product</label>
            <select name="items-{{ index }}-product_id" class="block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm product-select" data-product-id="">
                <option value="">Select product</option>
                {% for p in products %}
                    <option value="{{ p.id }}" data-price="{{ p.selling_price_per_unit or 0 }}" data-stock="{{ p.current_stock or 0 }}">{{ p.name }}</option>
                {% endfor %}
            </select>
            <div class="product-details mt-2"></div>
        </div>

        <!-- Quantity -->
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Qty</label>
            <input type="number" name="items-{{ index }}-quantity" class="block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm quantity" value="1" min="1">
        </div>

        <!-- Lot Selection -->
        <div class="md:col-span-3">
            <label class="block text-sm font-medium text-gray-700 mb-1">Lot</label>
            <select name="items-{{ index }}-lot_id" class="block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm lot-select">
                <option value="">Auto-assign (FIFO)</option>
            </select>
            <p class="mt-1 text-xs text-gray-500">Select specific lot or leave empty for auto‑assignment.</p>
        </div>

        <!-- Unit Price -->
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price</label>
            <input type="number" name="items-{{ index }}-unit_price" class="block w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm unit-price" step="0.01" value="0.00">
        </div>

        <!-- Subtotal (readonly) -->
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Subtotal</label>
            <input type="text" class="block w-full rounded-md border-gray-300 bg-gray-100 px-3 py-2 text-sm item-subtotal" name="items-{{ index }}-subtotal" value="0.00" readonly>
        </div>

        <!-- Remove Button -->
        <div class="md:col-span-1 flex items-end">
            <button type="button" class="inline-flex items-center px-2 py-1 border border-transparent text-sm font-medium rounded-md text-red-700 bg-red-100 hover:bg-red-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 remove-item">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    </div>
</div>
