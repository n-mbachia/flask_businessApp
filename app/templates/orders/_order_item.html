<div class="card mb-3 order-item">
  <div class="card-body row">

    <div class="col-md-4">
      <label class="form-label fw-semibold">Product</label>
      <select
        name="items-{{ loop.index0 }}-product_id"
        class="form-select product-select"
        data-product-id=""
      >
        <option value="">Select product</option>
        {% for p in products %}
          <option value="{{ p.id }}" data-price="{{ p.selling_price_per_unit or 0 }}" data-stock="{{ p.current_stock or 0 }}">{{ p.name }}</option>
        {% endfor %}
      </select>
      <div class="product-details mt-2"></div>
    </div>

    <div class="col-md-2">
      <label class="form-label fw-semibold">Qty</label>
      <input
        type="number"
        name="items-{{ loop.index0 }}-quantity"
        class="form-control quantity"
        value="1"
        min="1"
      >
    </div>
    <!-- Inside the order item row, after product select and quantity -->
    <div class="col-md-3">
    	<label class="form-label fw-semibold">Lot</label>
    	<select name="items-{{ index }}-lot_id" class="form-select lot-select">
       	    <option value="">Auto-assign (FIFO)</option>
    	</select>
    	<div class="form-text">Select specific lot or leave empty for auto‑assignment.</div>
    </div>
      
    <div class="col-md-2">
      <label class="form-label fw-semibold">Unit Price</label>
      <input
        type="number"
        name="items-{{ loop.index0 }}-unit_price"
        class="form-control unit-price"
        step="0.01"
        value="0.00"
      >
    </div>

    <div class="col-md-2">
      <label class="form-label fw-semibold">Subtotal</label>
      <input
        type="text"
        class="form-control item-subtotal bg-light"
        name="items-{{ loop.index0 }}-subtotal"
        value="0.00"
        readonly
      >
    </div>

    <div class="col-md-2 d-flex align-items-end">
      <button
        type="button"
        class="btn btn-outline-danger btn-sm"
        data-remove-item
      >
        <i class="fas fa-trash"></i>
      </button>
    </div>

  </div>
</div>
