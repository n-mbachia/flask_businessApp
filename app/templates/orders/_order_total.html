<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Subtotal</label>
        <input class="block w-full rounded-md border-gray-300 bg-gray-100 px-3 py-2 text-sm" value="{{ subtotal }}" readonly>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tax</label>
        <input class="block w-full rounded-md border-gray-300 bg-gray-100 px-3 py-2 text-sm" value="{{ tax }}" readonly>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Total</label>
        <input class="block w-full rounded-md border-gray-300 bg-gray-100 px-3 py-2 text-sm font-bold" value="{{ total }}" readonly>
    </div>
</div>
