<div class="bg-blue-50 border border-blue-200 rounded-md p-2 text-sm">
    <div class="flex items-start gap-2">
        <i class="fas fa-box text-blue-500 mt-1"></i>
        <div>
            <p><span class="font-medium">Price:</span> ${{ "%.2f"|format(product.price or 0) }}</p>
            <p>
                <span class="font-medium">Stock:</span>
                {{ product.current_stock if product.track_inventory else 'N/A' }}{% if product.track_inventory %} units{% endif %}
            </p>
            {% if product.track_inventory and product.current_stock <= 5 %}
                <p class="text-yellow-600 text-xs mt-1">
                    <i class="fas fa-exclamation-triangle mr-1"></i>Low stock!
                </p>
            {% endif %}
        </div>
    </div>
</div>
